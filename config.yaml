project:
  name: MediVision-AI
  version: 1.0.0

data:
  dataset_path: data/brain_tumor_dataset
  classes: [glioma, meningioma, notumor, pituitary]
  num_classes: 4
  img_size: [224, 224]
  batch_size: 32
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1

training:
  epochs: 50
  learning_rate: 0.001
  optimizer: adam
  loss: categorical_crossentropy
  early_stopping_patience: 10
  checkpoint_dir: checkpoints/

cnn:
  filters: [32, 64, 128, 256]
  kernel_size: 3
  dropout: 0.5
  dense_units: [512, 256]

vgg16:
  freeze_layers: 15
  fine_tune_lr: 0.0001
  dense_units: [1024, 512]

dcgan:
  latent_dim: 128
  epochs: 200
  discriminator_lr: 0.0002
  generator_lr: 0.0002

flask:
  host: 0.0.0.0
  port: 5000
  debug: false
  upload_folder: static/uploads/
  max_content_length: 16  # MB

mlflow:
  tracking_uri: mlruns/
  experiment_name: medivision-experiments
