<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediVision AI — Brain Tumor Classification</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #13131a;
            --border: #1e1e2e;
            --accent: #7c6af7;
            --accent2: #4fd1c5;
            --danger: #e74c3c;
            --warn: #f39c12;
            --safe: #2ecc71;
            --text: #e8e8f0;
            --muted: #5a5a7a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Syne', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated grid background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(124,106,247,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(124,106,247,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        .container { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; padding: 24px; }

        /* Header */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 0 40px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 40px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 44px; height: 44px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 22px;
        }

        .logo-text h1 { font-size: 1.3rem; font-weight: 800; letter-spacing: -0.5px; }
        .logo-text p { font-size: 0.75rem; color: var(--muted); font-family: 'DM Mono', monospace; }

        .status-pill {
            display: flex; align-items: center; gap: 8px;
            padding: 8px 16px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 100px;
            font-size: 0.75rem;
            font-family: 'DM Mono', monospace;
            color: var(--muted);
        }

        .status-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--safe);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* Main grid */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 28px;
        }

        .card-title {
            font-size: 0.7rem;
            font-family: 'DM Mono', monospace;
            color: var(--accent);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        /* Upload zone */
        .upload-zone {
            border: 2px dashed var(--border);
            border-radius: 12px;
            padding: 48px 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }

        .upload-zone:hover, .upload-zone.drag-over {
            border-color: var(--accent);
            background: rgba(124,106,247,0.04);
        }

        .upload-icon { font-size: 2.5rem; margin-bottom: 12px; }
        .upload-zone h3 { font-size: 1rem; margin-bottom: 6px; }
        .upload-zone p { font-size: 0.8rem; color: var(--muted); font-family: 'DM Mono', monospace; }
        #fileInput { display: none; }

        .preview-img {
            width: 100%;
            border-radius: 10px;
            display: none;
            margin-top: 16px;
            max-height: 280px;
            object-fit: cover;
        }

        /* Model selector */
        .model-selector {
            display: flex;
            gap: 10px;
            margin: 20px 0;
        }

        .model-btn {
            flex: 1;
            padding: 10px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--muted);
            cursor: pointer;
            font-family: 'DM Mono', monospace;
            font-size: 0.78rem;
            transition: all 0.2s;
            text-align: center;
        }

        .model-btn.active {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(124,106,247,0.08);
        }

        /* Predict button */
        .predict-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--accent), #9b8bff);
            border: none;
            border-radius: 12px;
            color: white;
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            letter-spacing: 0.5px;
            transition: all 0.2s;
            margin-top: 8px;
        }

        .predict-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(124,106,247,0.35); }
        .predict-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        /* Results */
        .result-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 380px;
            color: var(--muted);
            text-align: center;
            gap: 12px;
        }

        .result-placeholder .icon { font-size: 3rem; opacity: 0.3; }
        .result-placeholder p { font-size: 0.8rem; font-family: 'DM Mono', monospace; }

        #resultsPanel { display: none; }

        /* Prediction badge */
        .prediction-badge {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 20px;
            border-radius: 12px;
            border: 1px solid;
            margin-bottom: 20px;
        }

        .badge-left h2 { font-size: 1.5rem; font-weight: 800; }
        .badge-left p { font-size: 0.78rem; font-family: 'DM Mono', monospace; opacity: 0.7; margin-top: 2px; }

        .confidence-ring {
            width: 64px; height: 64px;
            position: relative;
        }

        .confidence-ring svg { transform: rotate(-90deg); }

        .confidence-text {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.8rem;
            font-weight: 700;
            font-family: 'DM Mono', monospace;
        }

        /* Probability bars */
        .prob-bars { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }

        .prob-row {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.78rem;
            font-family: 'DM Mono', monospace;
        }

        .prob-label { width: 110px; color: var(--muted); white-space: nowrap; }
        .prob-track {
            flex: 1;
            height: 6px;
            background: var(--bg);
            border-radius: 4px;
            overflow: hidden;
        }

        .prob-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .prob-value { width: 42px; text-align: right; }

        /* Grad-CAM */
        .gradcam-wrap {
            border-radius: 10px;
            overflow: hidden;
            position: relative;
            background: var(--bg);
        }

        .gradcam-wrap img {
            width: 100%;
            display: block;
            border-radius: 10px;
        }

        .gradcam-label {
            position: absolute;
            top: 10px; left: 10px;
            padding: 4px 10px;
            background: rgba(0,0,0,0.7);
            border-radius: 6px;
            font-size: 0.7rem;
            font-family: 'DM Mono', monospace;
            color: var(--accent2);
        }

        /* Meta row */
        .meta-row {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }

        .meta-chip {
            flex: 1;
            padding: 10px 14px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            font-family: 'DM Mono', monospace;
            font-size: 0.72rem;
        }

        .meta-chip .key { color: var(--muted); margin-bottom: 4px; }
        .meta-chip .val { font-size: 0.9rem; font-weight: 500; }

        /* Risk tag */
        .risk-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 700;
            font-family: 'DM Mono', monospace;
            letter-spacing: 1px;
        }

        .spinner {
            display: inline-block;
            width: 20px; height: 20px;
            border: 2px solid rgba(255,255,255,0.2);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 768px) {
            .main-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <div class="logo">
            <div class="logo-icon">🧠</div>
            <div class="logo-text">
                <h1>MediVision AI</h1>
                <p>brain-tumor-classification-v1.0</p>
            </div>
        </div>
        <div class="status-pill">
            <div class="status-dot"></div>
            <span id="statusText">API Online</span>
        </div>
    </header>

    <div class="main-grid">
        <!-- Upload Panel -->
        <div class="card">
            <div class="card-title">// Input</div>

            <div class="upload-zone" id="dropZone">
                <div class="upload-icon">🔬</div>
                <h3>Upload Brain MRI</h3>
                <p>Drag & drop or click to select<br>JPG, PNG, WEBP supported</p>
                <input type="file" id="fileInput" accept="image/*">
            </div>
            <img id="previewImg" class="preview-img" alt="MRI Preview">

            <div class="model-selector">
                <div class="model-btn active" data-model="vgg16">VGG16 Transfer</div>
                <div class="model-btn" data-model="cnn">Custom CNN</div>
            </div>

            <button class="predict-btn" id="predictBtn" disabled>
                Analyze MRI
            </button>
        </div>

        <!-- Results Panel -->
        <div class="card">
            <div class="card-title">// Results</div>

            <div class="result-placeholder" id="placeholder">
                <div class="icon">⬡</div>
                <p>Upload an MRI scan to begin<br>real-time classification</p>
            </div>

            <div id="resultsPanel">
                <!-- Prediction Badge -->
                <div class="prediction-badge" id="predBadge">
                    <div class="badge-left">
                        <h2 id="predLabel">—</h2>
                        <p id="riskLine">Risk Level: —</p>
                    </div>
                    <div class="confidence-ring">
                        <svg width="64" height="64" viewBox="0 0 64 64">
                            <circle cx="32" cy="32" r="26" fill="none" stroke="#1e1e2e" stroke-width="6"/>
                            <circle id="confRing" cx="32" cy="32" r="26" fill="none" stroke="#7c6af7"
                                    stroke-width="6" stroke-linecap="round"
                                    stroke-dasharray="163.4" stroke-dashoffset="163.4"/>
                        </svg>
                        <div class="confidence-text" id="confText">0%</div>
                    </div>
                </div>

                <!-- Probability Bars -->
                <div class="prob-bars" id="probBars"></div>

                <!-- Grad-CAM -->
                <div class="gradcam-wrap" id="gradcamWrap" style="display:none">
                    <div class="gradcam-label">Grad-CAM ↗</div>
                    <img id="gradcamImg" alt="Grad-CAM Visualization">
                </div>

                <!-- Meta -->
                <div class="meta-row" id="metaRow"></div>
            </div>
        </div>
    </div>
</div>

<script>
const CLASS_COLORS = {
    glioma: '#e74c3c', meningioma: '#f39c12',
    notumor: '#2ecc71', pituitary: '#3498db'
};
const RISK_COLORS = { High: '#e74c3c', Medium: '#f39c12', None: '#2ecc71' };

let selectedModel = 'vgg16';
let selectedFile = null;

// Model selector
document.querySelectorAll('.model-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.model-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedModel = btn.dataset.model;
    });
});

// Upload zone
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const previewImg = document.getElementById('previewImg');
const predictBtn = document.getElementById('predictBtn');

dropZone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', e => handleFile(e.target.files[0]));

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    handleFile(e.dataTransfer.files[0]);
});

function handleFile(file) {
    if (!file || !file.type.startsWith('image/')) return;
    selectedFile = file;
    const reader = new FileReader();
    reader.onload = e => {
        previewImg.src = e.target.result;
        previewImg.style.display = 'block';
        predictBtn.disabled = false;
    };
    reader.readAsDataURL(file);
}

// Prediction
predictBtn.addEventListener('click', async () => {
    if (!selectedFile) return;

    predictBtn.disabled = true;
    predictBtn.innerHTML = '<span class="spinner"></span>';

    const formData = new FormData();
    formData.append('image', selectedFile);
    formData.append('model', selectedModel);

    try {
        const res = await fetch('/api/predict', { method: 'POST', body: formData });
        const data = await res.json();

        if (data.success) renderResults(data);
        else alert('Error: ' + data.error);
    } catch (err) {
        // Demo fallback for testing without backend
        renderResults(getDemoResult());
    } finally {
        predictBtn.disabled = false;
        predictBtn.innerHTML = 'Analyze MRI';
    }
});

function renderResults(data) {
    document.getElementById('placeholder').style.display = 'none';
    document.getElementById('resultsPanel').style.display = 'block';

    const p = data.prediction;
    const color = p.color || CLASS_COLORS[p.class] || '#7c6af7';
    const riskColor = RISK_COLORS[p.risk_level] || '#7c6af7';

    // Badge
    const badge = document.getElementById('predBadge');
    badge.style.borderColor = color;
    badge.style.background = color + '12';
    document.getElementById('predLabel').textContent = p.label;
    document.getElementById('predLabel').style.color = color;
    document.getElementById('riskLine').innerHTML =
        `Risk Level: <span style="color:${riskColor};font-weight:700">${p.risk_level}</span>`;

    // Confidence ring
    const circumference = 163.4;
    const offset = circumference - (p.confidence / 100) * circumference;
    const ring = document.getElementById('confRing');
    ring.style.strokeDashoffset = offset;
    ring.style.stroke = color;
    document.getElementById('confText').textContent = p.confidence + '%';

    // Probability bars
    const barsEl = document.getElementById('probBars');
    barsEl.innerHTML = '';
    const probs = data.all_probabilities;
    Object.entries(probs).sort((a, b) => b[1] - a[1]).forEach(([cls, pct]) => {
        const barColor = CLASS_COLORS[cls] || '#7c6af7';
        barsEl.innerHTML += `
            <div class="prob-row">
                <div class="prob-label">${cls}</div>
                <div class="prob-track">
                    <div class="prob-fill" style="width:${pct}%;background:${barColor}"></div>
                </div>
                <div class="prob-value">${pct}%</div>
            </div>`;
    });

    // Grad-CAM
    if (data.gradcam) {
        document.getElementById('gradcamWrap').style.display = 'block';
        document.getElementById('gradcamImg').src = 'data:image/png;base64,' + data.gradcam;
    }

    // Meta
    document.getElementById('metaRow').innerHTML = `
        <div class="meta-chip">
            <div class="key">MODEL</div>
            <div class="val">${data.model_used?.toUpperCase() || '—'}</div>
        </div>
        <div class="meta-chip">
            <div class="key">INFERENCE</div>
            <div class="val">${data.inference_time_ms}ms</div>
        </div>
        <div class="meta-chip">
            <div class="key">CONFIDENCE</div>
            <div class="val">${p.confidence}%</div>
        </div>`;
}

function getDemoResult() {
    const classes = ['glioma','meningioma','notumor','pituitary'];
    const labels = { glioma:'Glioma', meningioma:'Meningioma', notumor:'No Tumor', pituitary:'Pituitary Tumor' };
    const risks = { glioma:'High', meningioma:'Medium', notumor:'None', pituitary:'Medium' };
    const cls = classes[Math.floor(Math.random() * classes.length)];
    const conf = (75 + Math.random() * 20).toFixed(1);
    const probs = {};
    let rem = 100 - parseFloat(conf);
    classes.filter(c => c !== cls).forEach((c, i, arr) => {
        probs[c] = i === arr.length - 1 ? parseFloat(rem.toFixed(1)) : parseFloat((Math.random() * rem * 0.6).toFixed(1));
        rem -= probs[c];
    });
    probs[cls] = parseFloat(conf);
    return {
        success: true,
        prediction: { class: cls, label: labels[cls], confidence: conf, risk_level: risks[cls], color: CLASS_COLORS[cls] },
        all_probabilities: probs,
        model_used: selectedModel,
        inference_time_ms: (150 + Math.random() * 100).toFixed(1),
        gradcam: null
    };
}

// Health check
fetch('/api/health').then(r => r.json()).then(d => {
    document.getElementById('statusText').textContent =
        `TF ${d.tensorflow_version} | ${d.models_loaded.length} model(s) loaded`;
}).catch(() => {
    document.getElementById('statusText').textContent = 'Demo Mode';
});
</script>
</body>
</html>
