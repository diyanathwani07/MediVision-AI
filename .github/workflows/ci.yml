name: MediVision AI — CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install tensorflow==2.15.0 flask pytest numpy pillow pyyaml

    - name: Run model architecture tests
      run: pytest tests/ -v

    - name: Lint with flake8
      run: |
        pip install flake8
        flake8 src/ models/ utils/ --max-line-length=100
